version: '3.8'

services:
  # WireGuard VPN with Contract Integration for Phala Cloud
  wireguard-vpn:
    image: alpine:3.19
    container_name: wireguard-vpn-phala
    environment:
      - NODE_ID=${NODE_ID:-node-2}
      - NETWORK=${NETWORK:-base}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-30000}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - RPC_URL=${RPC_URL}
      - CONTRACT_PRIVATE_KEY=${CONTRACT_PRIVATE_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - HEALTH_CHECK_PORT=8080
      - PHALA_DEPLOYMENT=true
      - TEE_ENVIRONMENT=true
      - WIREGUARD_DEBUG=true
    volumes:
      - wireguard-logs:/var/log/wireguard
    ports:
      - "51820:51820/udp"
      - "8080:8080/tcp"
    networks:
      - vpn-network
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: true
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache wireguard-tools iptables bash curl iproute2 nodejs npm;
        echo 'Installing Node.js dependencies...';
        mkdir -p /app;
        cd /app;
        echo 'Starting WireGuard VPN in DEBUG mode...';
        echo 'NODE_ID: $NODE_ID';
        echo 'CONTRACT_ADDRESS: $CONTRACT_ADDRESS';
        echo 'RPC_URL: $RPC_URL';
        echo 'TEE_ENVIRONMENT: $TEE_ENVIRONMENT';
        echo 'PHALA_DEPLOYMENT: $PHALA_DEPLOYMENT';
        echo 'LOG_LEVEL: $LOG_LEVEL';
        echo 'WIREGUARD_DEBUG: $WIREGUARD_DEBUG';
        echo 'Starting WireGuard with verbose logging...';
        wg-quick up wg0 --verbose || echo 'WireGuard setup failed, continuing...';
        echo 'WireGuard setup complete';
        sleep infinity;
      "
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Mullvad Proxy for UDP-to-TCP tunneling (DStack compatible - port 8000)
  mullvad-proxy:
    image: alpine:3.19
    container_name: mullvad-proxy-phala
    environment:
      - PROXY_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "8000:8000/tcp"
    networks:
      - vpn-network
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache socat;
        echo 'Starting UDP-to-TCP proxy on port 8000 for DStack compatibility...';
        socat TCP-LISTEN:8000,fork UDP:wireguard-vpn-phala:51820 &
        echo 'Proxy started successfully on port 8000';
        sleep infinity;
      "

  # Test client for connectivity verification (node-2 only)
  test-client:
    image: alpine:3.19
    container_name: test-client-phala
    networks:
      - vpn-network
    depends_on:
      wireguard-vpn:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache curl wget;
        echo 'Testing Phala Cloud VPN connectivity...';
        echo 'This is node-2 (client node)';
        echo 'Testing connectivity to node-1 (server node)...';
        ping -c 3 10.0.0.1;
        echo 'Testing HTTP connectivity to nginx server...';
        wget -qO- http://10.0.0.1:80 || echo 'HTTP test failed';
        echo 'Testing bridge health...';
        curl -s http://wireguard-vpn-phala:8080/health || echo 'Health check failed';
        echo 'Testing TEE environment...';
        echo 'TEE_ENVIRONMENT: $TEE_ENVIRONMENT';
        echo 'PHALA_DEPLOYMENT: $PHALA_DEPLOYMENT';
        echo 'Test complete';
        sleep infinity;
      "
    restart: unless-stopped

volumes:
  wireguard-logs:

networks:
  vpn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24 