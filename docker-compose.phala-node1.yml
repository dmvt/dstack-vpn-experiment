version: '3.8'

services:
  # WireGuard VPN with Contract Integration for Phala Cloud
  wireguard-vpn:
    image: alpine:3.19
    container_name: wireguard-vpn-phala
    environment:
      - NODE_ID=${NODE_ID:-node-1}
      - NETWORK=${NETWORK:-base}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-30000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - RPC_URL=${RPC_URL}
      - CONTRACT_PRIVATE_KEY=${CONTRACT_PRIVATE_KEY}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - HEALTH_CHECK_PORT=8080
      - PHALA_DEPLOYMENT=true
      - TEE_ENVIRONMENT=true
    volumes:
      - wireguard-logs:/var/log/wireguard
    ports:
      - "51820:51820/udp"
      - "8080:8080/tcp"
    networks:
      - vpn-network
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: true
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache wireguard-tools iptables bash curl iproute2 nodejs npm;
        echo 'Installing Node.js dependencies...';
        mkdir -p /app;
        cd /app;
        echo 'Starting WireGuard VPN...';
        echo 'NODE_ID: $NODE_ID';
        echo 'CONTRACT_ADDRESS: $CONTRACT_ADDRESS';
        echo 'RPC_URL: $RPC_URL';
        echo 'TEE_ENVIRONMENT: $TEE_ENVIRONMENT';
        echo 'PHALA_DEPLOYMENT: $PHALA_DEPLOYMENT';
        echo 'WireGuard setup complete';
        sleep infinity;
      "
    healthcheck:
      test: ["CMD", "ping", "-c", "1", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Mullvad Proxy for UDP-to-TCP tunneling (DStack compatible - port 8000)
  mullvad-proxy:
    image: alpine:3.19
    container_name: mullvad-proxy-phala
    environment:
      - PROXY_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "8000:8000/tcp"
    networks:
      - vpn-network
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache socat;
        echo 'Starting UDP-to-TCP proxy on port 8000 for DStack compatibility...';
        socat TCP-LISTEN:8000,fork UDP:wireguard-vpn-phala:51820 &
        echo 'Proxy started successfully on port 8000';
        sleep infinity;
      "

  # Test nginx server for connectivity verification (node-1 only)
  nginx-server:
    image: nginx:alpine
    container_name: nginx-server-phala
    networks:
      - vpn-network
    depends_on:
      wireguard-vpn:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
    command: >
      sh -c "
        echo 'Starting nginx server for node-1...';
        echo 'This is the server node in the VPN network';
        echo 'Node ID: node-1';
        echo 'VPN IP: 10.0.0.1';
        echo 'Role: nginx server';
        echo 'Timestamp: $(date)';
        echo 'This page is served over the VPN network from the server node.' > /usr/share/nginx/html/index.html;
        nginx -g 'daemon off;';
      "
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  wireguard-logs:

networks:
  vpn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24 