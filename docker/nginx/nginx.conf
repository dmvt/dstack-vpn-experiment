events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server {
        listen 80;
        server_name localhost;

        location / {
            return 200 "Hello from DStack VPN Node 1 (Server)!\n\nNode ID: node-1\nRole: nginx server\nVPN IP: 10.0.0.1\nTimestamp: $(date)\n\nThis page is served over the VPN network from the server node.\n";
            add_header Content-Type text/plain;
        }

        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location /info {
            return 200 "DStack VPN Node 1\nRole: Server\nIP: 10.0.0.1\n";
            add_header Content-Type text/plain;
        }
    }
} 